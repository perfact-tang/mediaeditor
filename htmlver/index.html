<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MediaSplitter AI</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="shell">
      <aside class="sidebar">
        <div class="brand">SPLICER<span>PRO</span></div>
        <section class="session">
          <div class="session-icon">▣</div>
          <div>
            <p>CURRENT SESSION</p>
            <strong id="sessionName">No media</strong>
          </div>
        </section>
      </aside>

      <main class="workspace">
        <header class="topbar">
          <button id="exportTopBtn" class="primary" disabled>Export</button>
        </header>

        <section class="stage">
          <div id="dropZone" class="drop-zone">
            <input id="fileInput" type="file" accept="video/mp4,video/quicktime,video/x-matroska,audio/mpeg,audio/wav,audio/mp4,.mp4,.mov,.mkv,.mp3,.wav,.m4a" />
            <div class="drop-plus">+</div>
            <h1>ここにファイルをドラッグ＆ドロップ</h1>
            <p>またはクリックしてデバイスから参照</p>
            <div class="chips"><span>.mp4</span><span>.mov</span><span>.mkv</span><span>.mp3</span><span>.wav</span><span>.m4a</span></div>
          </div>

          <div id="editor" class="editor hidden">
            <div class="preview-frame">
              <video id="video" playsinline></video>
              <audio id="audio"></audio>
              <div id="audioPoster" class="audio-poster hidden">
                <div class="bars" aria-hidden="true"></div>
                <strong>Audio Preview</strong>
              </div>
              <div id="timeBadge" class="time-badge">00:00.000</div>
            </div>

            <div class="transport">
              <button id="backBtn" title="Back 5 seconds">|‹</button>
              <button id="playBtn" class="play" title="Play/Pause">▶</button>
              <button id="setStartBtn" title="Set start from playhead">Start</button>
              <button id="setEndBtn" title="Set end from playhead">End</button>
              <button id="addSegmentBtn" title="Add selected segment">＋</button>
              <label class="speed">
                <select id="speedSelect">
                  <option value="0.5">0.5x</option>
                  <option value="1" selected>1.0x</option>
                  <option value="1.5">1.5x</option>
                  <option value="2">2.0x</option>
                  <option value="3">3.0x</option>
                  <option value="5">5.0x</option>
                </select>
              </label>
            </div>

            <div class="timeline" id="timeline">
              <canvas id="waveform" height="86"></canvas>
              <div id="selectedRange" class="selected-range"></div>
              <div id="startLine" class="range-line start-line"><span>Start</span></div>
              <div id="endLine" class="range-line end-line"><span>End</span></div>
              <div id="playhead" class="playhead"></div>
              <div id="segmentMarks" class="segment-marks"></div>
            </div>
          </div>
        </section>
      </main>

      <aside class="batch-panel">
        <div class="panel-head">
          <h2>分割</h2>
          <span id="uploadState">Static HTML</span>
        </div>
        <section class="media-meta">
          <dl>
            <div><dt>File</dt><dd id="metaFile">-</dd></div>
            <div><dt>Duration</dt><dd id="metaDuration">-</dd></div>
            <div><dt>Size</dt><dd id="metaSize">-</dd></div>
            <div><dt>Resolution</dt><dd id="metaResolution">-</dd></div>
          </dl>
        </section>
        <section class="segment-tools">
          <label>Project name<input id="projectName" placeholder="V001_Final_Cut" /></label>
          <div class="range-editor">
            <label>Start<input id="startInput" value="00:00.000" /></label>
            <label>End<input id="endInput" value="00:00.000" /></label>
          </div>
          <div class="output-controls">
            <label class="output-toggle"><input id="videoOutput" type="checkbox" checked /> 動画</label>
            <label class="output-toggle"><input id="audioOutput" type="checkbox" /> 音声</label>
            <label class="format-select">音声形式
              <select id="audioFormat">
                <option value="mp3">mp3</option>
                <option value="wav">wav</option>
              </select>
            </label>
            <label class="output-toggle muted-toggle"><input type="checkbox" disabled /> 文字起こし</label>
          </div>
        </section>
        <ol id="segmentList" class="segment-list"></ol>
        <div class="action-bar">
          <progress id="progress" max="100" value="0"></progress>
          <button id="runSplitBtn" class="primary wide" disabled>分段JSON/FFmpegコマンドを保存</button>
          <p id="statusLine">メディアを読み込んで開始します。</p>
        </div>
      </aside>
    </div>
    <script src="./app.js"></script>
  </body>
</html>
